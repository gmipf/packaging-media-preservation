name: watch-dic-releases

# DIC bumps quarterly (4× per year). Daily polling is overkill but cheap,
# and ensures we never miss a release. With source-build (no body-parse
# needed since reverting binary-repackage in commit dXXXXXXX), we only
# need to rewrite the %global dicver line — Source0 is a deterministic
# archive URL derived from the tag, so it doesn't change separately.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync discimagecreator spec with upstream release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPEC=fedora/discimagecreator/discimagecreator.spec
          MARKER=fedora/discimagecreator/.upstream-tag

          UPSTREAM_TAG=$(gh api repos/saramibreak/DiscImageCreator/releases/latest --jq '.tag_name')
          LOCAL_TAG=$(cat "$MARKER" 2>/dev/null || echo none)

          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "Tag unchanged ($LOCAL_TAG) — no rebuild needed"
            exit 0
          fi

          echo "Upstream tag changed: $LOCAL_TAG -> $UPSTREAM_TAG"
          echo "$UPSTREAM_TAG" > "$MARKER"
          sed -i "s|^%global dicver .*|%global dicver       ${UPSTREAM_TAG}|" "$SPEC"

          # New upstream release = fresh identity, so reset the
          # packaging-iteration counter and prepend a %changelog entry
          # (LC_ALL=C for an English date; EVR without %{?dist} to match
          # the existing hand-written entries).
          sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC"
          CL_ENTRY=$(mktemp)
          {
            printf '* %s gmipf <gmipf64@gmail.com> - %s-1\n' \
              "$(LC_ALL=C date -u +'%a %b %d %Y')" "$UPSTREAM_TAG"
            printf -- '- Automated sync to upstream DiscImageCreator release %s; Release reset to 1.\n' "$UPSTREAM_TAG"
            printf '\n'
          } > "$CL_ENTRY"
          sed -i "/^%changelog/r $CL_ENTRY" "$SPEC"
          rm -f "$CL_ENTRY"

          git add "$SPEC" "$MARKER"
          if git diff --cached --quiet; then
            echo "Spec and marker unchanged after rewrite — exiting clean"
            exit 0
          fi

          git config user.name "rolling-watcher"
          git config user.email "actions@github.com"
          git commit -m "chore: discimagecreator ${UPSTREAM_TAG}"
          # Trigger branch = main's tree + a short, branch-specific landing
          # README (purely cosmetic: a distinct view per branch when browsing
          # GitHub). That one-file diff means build-dic is no longer a
          # fast-forward of main, so we recreate it and force-push — harmless,
          # since trigger refs are disposable and nobody branches off them.
          # Fires ONLY the discimagecreator job; other tools keep their
          # NEVRA; main stays canonical and builds nothing.
          # Manual single build:  git push origin main:build-dic
          git push origin HEAD:main
          git checkout -q -b trigger-tmp
          printf '# build-dic — DiscImageCreator (Fedora/COPR trigger branch)\n\nAuto-managed **trigger branch** for the `discimagecreator` package: a push\nhere fires its COPR build via Packit, nothing else rebuilds. Canonical\nsource is `main` (do not edit here). Packaging: `fedora/discimagecreator/`.\n' > README.md
          git add README.md
          git commit -q -m "trigger: discimagecreator build (branch landing README)"
          git push -f origin trigger-tmp:build-dic
