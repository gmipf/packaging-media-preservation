name: watch-dic-releases

# DIC bumps quarterly (4× per year). Daily polling is overkill but cheap,
# and ensures we never miss a release. With source-build (no body-parse
# needed since reverting binary-repackage in commit dXXXXXXX), we only
# need to rewrite the %global dicver line — Source0 is a deterministic
# archive URL derived from the tag, so it doesn't change separately.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync discimagecreator spec with upstream release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPEC=fedora/discimagecreator/discimagecreator.spec
          MARKER=fedora/discimagecreator/.upstream-tag

          UPSTREAM_TAG=$(gh api repos/saramibreak/DiscImageCreator/releases/latest --jq '.tag_name')
          LOCAL_TAG=$(cat "$MARKER" 2>/dev/null || echo none)

          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "Tag unchanged ($LOCAL_TAG) — no rebuild needed"
            exit 0
          fi

          echo "Upstream tag changed: $LOCAL_TAG -> $UPSTREAM_TAG"
          echo "$UPSTREAM_TAG" > "$MARKER"
          sed -i "s|^%global dicver .*|%global dicver       ${UPSTREAM_TAG}|" "$SPEC"

          git add "$SPEC" "$MARKER"
          if git diff --cached --quiet; then
            echo "Spec and marker unchanged after rewrite — exiting clean"
            exit 0
          fi

          git config user.name "rolling-watcher"
          git config user.email "actions@github.com"
          git commit -m "chore: discimagecreator ${UPSTREAM_TAG}"
          git push
