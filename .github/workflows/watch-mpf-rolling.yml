name: watch-mpf-rolling

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync mpf spec with upstream rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPEC=fedora/mpf/mpf.spec
          MARKER=fedora/mpf/.rolling-sha

          UPSTREAM_SHA_FULL=$(gh api repos/SabreTools/MPF/git/refs/tags/rolling --jq '.object.sha')
          LOCAL_SHA=$(cat "$MARKER" 2>/dev/null || echo none)

          if [ "$UPSTREAM_SHA_FULL" = "$LOCAL_SHA" ]; then
            echo "Rolling SHA unchanged ($LOCAL_SHA) — no rebuild needed"
            exit 0
          fi

          UPSTREAM_SHA=${UPSTREAM_SHA_FULL:0:8}
          UPSTREAM_TS=$(gh api repos/SabreTools/MPF/releases/tags/rolling --jq '.published_at' | tr -d -- '-:TZ' | head -c 14)

          # All three csproj files (MPF.Check, MPF.CLI, MPF.Avalonia) carry
          # the same <VersionPrefix>. Reading just one is enough.
          UPSTREAM_VERSION=$(curl -fsSL "https://raw.githubusercontent.com/SabreTools/MPF/${UPSTREAM_SHA_FULL}/MPF.Check/MPF.Check.csproj" \
                             | grep -oP '(?<=<VersionPrefix>)[^<]+' | head -1)

          if [ -z "$UPSTREAM_VERSION" ]; then
            echo "Failed to extract VersionPrefix from csproj"
            exit 1
          fi

          echo "Upstream: version=$UPSTREAM_VERSION sha=$UPSTREAM_SHA ts=$UPSTREAM_TS"

          echo "$UPSTREAM_SHA_FULL" > "$MARKER"

          # Tilde-style rolling snapshot lives in two %global lines in the
          # spec. Rewrite both (%global mpfver -> base, %global mpfsnap ->
          # <UTC-TS>.<short-SHA>) and reset Release to 1: a new snapshot is a
          # fresh identity, so the packaging-iteration counter starts over.
          # RPM sorts on Version first, so -1 still supersedes the previous
          # snapshot's -N.
          sed -i "s/^%global mpfver .*/%global mpfver         ${UPSTREAM_VERSION}/"           "$SPEC"
          sed -i "s/^%global mpfsnap .*/%global mpfsnap        ${UPSTREAM_TS}.${UPSTREAM_SHA}/" "$SPEC"
          sed -i "s/^Release:.*/Release:        1%{?dist}/"                                     "$SPEC"

          # Prepend a %changelog entry for the new snapshot. EVR is written
          # without %{?dist} to match the existing hand-written entries.
          CL_ENTRY=$(mktemp)
          {
            printf '* %s gmipf <gmipf64@gmail.com> - %s~%s.%s-1\n' \
              "$(LC_ALL=C date -u +'%a %b %d %Y')" "$UPSTREAM_VERSION" "$UPSTREAM_TS" "$UPSTREAM_SHA"
            printf -- '- Automated rolling-snapshot sync to upstream MPF commit %s\n' "$UPSTREAM_SHA"
            printf '  (rolling tag, published %s UTC); Release reset to 1.\n' "$UPSTREAM_TS"
            printf '\n'
          } > "$CL_ENTRY"
          sed -i "/^%changelog/r $CL_ENTRY" "$SPEC"
          rm -f "$CL_ENTRY"

          git add "$SPEC" "$MARKER"
          if git diff --cached --quiet; then
            echo "Spec and marker unchanged after rewrite — exiting clean"
            exit 0
          fi

          git config user.name "rolling-watcher"
          git config user.email "actions@github.com"
          git commit -m "chore: mpf ${UPSTREAM_VERSION} rolling ${UPSTREAM_SHA} @ ${UPSTREAM_TS}"
          # Trigger branch = main's tree + a short, branch-specific landing
          # README (purely cosmetic: a distinct view per branch when browsing
          # GitHub). That one-file diff means build-mpf is no longer a
          # fast-forward of main, so we recreate it and force-push — harmless,
          # since trigger refs are disposable and nobody branches off them.
          # Fires ONLY the mpf job; other tools keep their NEVRA; main stays
          # canonical and builds nothing (no job watches main).
          # Manual single build:  git push origin main:build-mpf
          git push origin HEAD:main
          git checkout -q -b trigger-tmp
          printf '# build-mpf — MPF (Fedora/COPR trigger branch)\n\nAuto-managed **trigger branch** for the `mpf` package: a push here fires\nthe mpf COPR build via Packit, nothing else rebuilds. Canonical source is\n`main` (do not edit here). Packaging: `fedora/mpf/`.\n' > README.md
          git add README.md
          git commit -q -m "trigger: mpf build (branch landing README)"
          git push -f origin trigger-tmp:build-mpf
