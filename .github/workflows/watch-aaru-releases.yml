name: watch-aaru-releases

# Aaru is on the v6.0.0 alpha track — upstream publishes a new alpha
# tag every 2–6 weeks. We poll daily, pick the highest `alpha.<N>` tag
# (including sub-revisions like `alpha.15.1`), and rewrite the
# `%global aaruprerel` line in the spec. Source0/Source1 URLs are
# deterministic from the tag, so no body-parse or asset lookup needed.
#
# Loud-fail conditions (manual review required — tilde-versioning and
# Epoch strategy in the spec assume alpha-only):
#   * stable v6.0.0 (no -alpha)
#   * v6.0.0-beta.* or v6.0.0-rc.*
#   * v7.* or higher major
# When any of these appear among recent releases, the workflow exits
# nonzero so the cron run is visibly broken in the Actions UI.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync aaru spec with upstream alpha release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPEC=fedora/aaru/aaru.spec
          MARKER=fedora/aaru/.upstream-tag

          # Detect any tag that signals upstream has left the alpha track.
          TRANSITION=$(gh api 'repos/aaru-dps/Aaru/releases?per_page=20' --jq '
            [.[] | select(.draft == false) | .tag_name
                 | select(test("^v(6\\.0\\.0$|6\\.0\\.0-(beta|rc)|[7-9]\\.)"))]
            | .[]
          ')
          if [ -n "$TRANSITION" ]; then
            echo "::error::Aaru moved past the alpha track — manual spec review required"
            echo "Transitional tags detected:"
            echo "$TRANSITION"
            exit 1
          fi

          # Pick the highest v6.0.0-alpha.<N>[.<M>] tag by numeric sort
          # of each dot-separated component after `alpha.`.
          UPSTREAM_TAG=$(gh api 'repos/aaru-dps/Aaru/releases?per_page=20' --jq '
            [.[] | select(.draft == false
                          and (.tag_name | test("^v6\\.0\\.0-alpha\\.[0-9]+(\\.[0-9]+)?$")))
                 | .tag_name]
            | sort_by([. | sub("^v6\\.0\\.0-alpha\\."; "") | split(".") | map(tonumber)])
            | last
          ')

          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "::error::No matching v6.0.0-alpha.<N> tag found in recent releases"
            exit 1
          fi

          LOCAL_TAG=$(cat "$MARKER" 2>/dev/null || echo none)

          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "Tag unchanged ($LOCAL_TAG) — no rebuild needed"
            exit 0
          fi

          echo "Upstream tag changed: $LOCAL_TAG -> $UPSTREAM_TAG"

          # Strip `v6.0.0-` prefix to get the prerel value the spec wants
          # (e.g. `alpha.19` or `alpha.15.1`).
          PRERELEASE=${UPSTREAM_TAG#v6.0.0-}

          echo "$UPSTREAM_TAG" > "$MARKER"
          sed -i "s|^%global aaruprerel .*|%global aaruprerel    ${PRERELEASE}|" "$SPEC"

          # New upstream prerelease = fresh identity, so reset the
          # packaging-iteration counter and prepend a %changelog entry.
          # aaruver (the base version) is read back from the spec so the
          # EVR matches Version = %{aaruver}~%{aaruprerel}. LC_ALL=C for an
          # English date; EVR without %{?dist} to match existing entries.
          AARUVER=$(grep -oP '^%global aaruver\s+\K\S+' "$SPEC")
          sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC"
          CL_ENTRY=$(mktemp)
          {
            printf '* %s gmipf <gmipf64@gmail.com> - %s~%s-1\n' \
              "$(LC_ALL=C date -u +'%a %b %d %Y')" "$AARUVER" "$PRERELEASE"
            printf -- '- Automated sync to upstream Aaru %s; Release reset to 1.\n' "$UPSTREAM_TAG"
            printf '\n'
          } > "$CL_ENTRY"
          sed -i "/^%changelog/r $CL_ENTRY" "$SPEC"
          rm -f "$CL_ENTRY"

          git add "$SPEC" "$MARKER"
          if git diff --cached --quiet; then
            echo "Spec and marker unchanged after rewrite — exiting clean"
            exit 0
          fi

          git config user.name "rolling-watcher"
          git config user.email "actions@github.com"
          git commit -m "chore: aaru ${UPSTREAM_TAG}"
          git push
