issue_repository: https://github.com/gmipf/packaging-media-preservation

srpm_build_deps:
  - rpm-build
  - rpmdevtools

# Multi-package layout — each tool gets its own block under packages:.
# When `paths:` is set, `specfile_path` and action-internal paths are
# relative to that path (Packit joins them: paths + specfile_path).
# create-archive overrides are needed because this repo holds only
# packaging recipes (no upstream source); default `git archive HEAD`
# would only archive the spec. We use spectool to fetch Source0 instead.
packages:
  redumper:
    paths:
      - fedora/redumper/
    specfile_path: redumper.spec
    upstream_project_url: https://github.com/superg/redumper
    upstream_tag_template: "b{version}"
    actions:
      get-current-version:
        - bash -c "rpmspec -q --queryformat '%{version}\n' redumper.spec | head -1"
      create-archive:
        - bash -c "spectool -g redumper.spec 1>&2"
        - bash -c "ls -1 redumper-b*.tar.gz | head -1"

  mpf-check:
    paths:
      - fedora/mpf-check/
    specfile_path: mpf-check.spec
    upstream_project_url: https://github.com/SabreTools/MPF
    # No get-current-version action — watch-mpf-rolling.yml writes the
    # Version line into the spec directly when the upstream rolling SHA
    # changes, so rpmspec already returns the correct value.
    actions:
      create-archive:
        - bash -c "spectool -g mpf-check.spec 1>&2"
        - bash -c "ls -1 MPF.Check_net10.0_linux-x64_release.zip"

  discimagecreator:
    paths:
      - fedora/discimagecreator/
    specfile_path: discimagecreator.spec
    upstream_project_url: https://github.com/saramibreak/DiscImageCreator
    # Multi-source build: spectool -g fetches all 4 Source* archives
    # (DiscImageCreator + EccEdc + DVDAuth + unscrambler helper tools).
    # create-archive returns the main DIC tarball as the primary archive;
    # SRPM packs all four automatically.
    actions:
      create-archive:
        - bash -c "spectool -g discimagecreator.spec 1>&2"
        - bash -c "ls -1 DiscImageCreator-*.tar.gz | head -1"

  aaru:
    paths:
      - fedora/aaru/
    specfile_path: aaru.spec
    upstream_project_url: https://github.com/aaru-dps/Aaru
    # Aaru is currently on v6 alpha pre-releases; we pin manually in
    # the spec (no watcher). spectool -g pulls both upstream tarballs
    # (prebuilt linux_amd64 binary + signed source) and the SRPM packs
    # them both.
    actions:
      create-archive:
        - bash -c "spectool -g aaru.spec 1>&2"
        - bash -c "ls -1 aaru-*-alpha.19_linux_amd64.tar.xz | head -1"

jobs:
  - job: pull_from_upstream
    trigger: release
    packages: [redumper]
    dist_git_branches:
      - fedora-43

  # Per-package commit jobs. Packit uses each package's package-level
  # paths: declaration (see packages: above) to determine which packages
  # are "touched" by a commit and only fires the matching jobs.
  # Redumper: spec-supplied b<n> version is monotonic, no auto-suffix.
  # mpf-check: watcher writes full Release (1.<ts>.<sha>%{?dist}) before
  # commit, so no auto-suffix needed either.
  - job: copr_build
    trigger: commit
    branch: main
    packages: [redumper]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: commit
    branch: main
    packages: [mpf-check]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  # discimagecreator: spec-supplied tag-version (YYYYMMDD) is monotonic,
  # no auto-suffix needed.
  - job: copr_build
    trigger: commit
    branch: main
    packages: [discimagecreator]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  # aaru: spec-supplied (6.0.0-0.alpha.19.1) is monotonic; on next
  # upstream alpha bump the Release segment goes up.
  - job: copr_build
    trigger: commit
    branch: main
    packages: [aaru]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64

  - job: copr_build
    trigger: pull_request
    packages: [redumper, mpf-check, discimagecreator, aaru]
    update_release: false
    owner: gmipf
    project: media-preservation
    targets:
      - fedora-all-x86_64
